        body {

            background-color: #020617;
            color: #f8fafc;

        .hero-mesh {

                radial-gradient(at 50% 0%, hsla(215, 96%, 10%, 1) 0, transparent 50%),

        .project-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (min-width: 1024px) {

                transform: translateY(-12px);
                border-color: rgba(59, 130, 246, 0.5);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }
        }

        .menu-hidden {
            display: none;
        }

        .menu-visible {
            display: block;
            animation: slideDown 0.3s ease-out forwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

        const container = document.getElementById('projects-container');

        projects.forEach(project => {
            const card = `
                <div class="project-card bg-slate-900/40 backdrop-blur-md border border-white/10 rounded-[2rem] md:rounded-[2.5rem] overflow-hidden flex flex-col group">
                    <div class="relative h-56 md:h-64 overflow-hidden">
                        <img src="${project.img}" alt="${project.title}" class="w-full h-full object-cover transition-transform duration-700 md:group-hover:scale-110 opacity-80 md:group-hover:opacity-100">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent"></div>
                        <div class="absolute bottom-6 left-6 md:left-8">
                            <span class="bg-blue-600 text-white text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-lg">
                                Site #${project.id + 1}
                            </span>
                        </div>
                    </div>
                    <div class="p-6 md:p-8 flex-1 flex flex-col">
                        <h3 class="text-xl md:text-2xl font-black text-white mb-2 md:group-hover:text-blue-400 transition-colors">${project.title}</h3>

                            ${project.type}
                        </p>
                        <div class="mt-auto pt-6 border-t border-white/5 flex items-center justify-between">

                                Open Map
                                <i data-lucide="map" class="ml-2 w-4 h-4"></i>

                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });

        // Menu Toggle Logic (Exact same as updated.html)
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = menuToggle.querySelector('i');

        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            const isHidden = mobileMenu.classList.contains('menu-hidden');
            if (isHidden) {
                mobileMenu.classList.replace('menu-hidden', 'menu-visible');
                lucide.createIcons({ attrs: { 'data-lucide': 'x' }, nameAttr: 'data-lucide' });
            } else {
                mobileMenu.classList.replace('menu-visible', 'menu-hidden');
                lucide.createIcons({ attrs: { 'data-lucide': 'menu' }, nameAttr: 'data-lucide' });
            }
        });

        document.addEventListener('click', () => {
            if (mobileMenu.classList.contains('menu-visible')) {
                mobileMenu.classList.replace('menu-visible', 'menu-hidden');
                lucide.createIcons({ attrs: { 'data-lucide': 'menu' }, nameAttr: 'data-lucide' });
            }
        });

        // Initialize Lucide Icons
        lucide.createIcons();

        // Navbar Scroll Logic
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('py-2', 'lg:py-3');
                nav.classList.remove('py-4', 'lg:py-6');
            } else {
                nav.classList.add('py-4', 'lg:py-6');
                nav.classList.remove('py-2', 'lg:py-3');
            }
        });
